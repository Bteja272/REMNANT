name: REMNANT CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build -w packages/shared

      - name: Build C++ consequence engine
        run: npm run build:cpp

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build