services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: remnant-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: remnant-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: remnant-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://remnant-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: remnant-postgres
    environment:
      POSTGRES_USER: remnant
      POSTGRES_PASSWORD: remnant
      POSTGRES_DB: remnant
    ports:
      - "5432:5432"
    volumes:
      - remnant_postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7.2-alpine
    container_name: remnant-redis
    ports:
      - "6379:6379"

  api:
    image: node:20-alpine
    container_name: remnant-api
    working_dir: /app
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      KAFKA_BROKER: remnant-kafka:29092
      DATABASE_URL: postgres://remnant:remnant@remnant-postgres:5432/remnant
      REDIS_URL: redis://remnant-redis:6379
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: sh -c "npm install && npm run build -w packages/shared && npm run dev -w apps/api"

  worker:
    image: node:20-alpine
    container_name: remnant-worker
    working_dir: /app
    depends_on:
      kafka:
        condition: service_healthy
      api:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_started
    environment:
      KAFKA_BROKER: remnant-kafka:29092
      CONSUMER_GROUP_ID: remnant-consequence-worker
      DATABASE_URL: postgres://remnant:remnant@remnant-postgres:5432/remnant
      REDIS_URL: redis://remnant-redis:6379
      CONSEQUENCE_ENGINE_PATH: /app/engines/consequence-cpp/build/remnant_consequence_engine
      WORKER_METRICS_PORT: 9101
      # CONSEQUENCE_ENGINE_PATH: /app/engines/consequence-cpp/build/missing_engine
    volumes:
      - .:/app
    ports:
      - "9101:9101"
    command: >
      sh -c "
        apk add --no-cache g++ &&
        mkdir -p engines/consequence-cpp/build &&
        g++ -std=c++17 -O2 engines/consequence-cpp/src/main.cpp -o engines/consequence-cpp/build/remnant_consequence_engine &&
        npm install &&
        npm run build -w packages/shared &&
        npm run dev -w apps/worker
      "
  
  dashboard:
    image: node:20-alpine
    container_name: remnant-dashboard
    working_dir: /app
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev -w apps/dashboard"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: remnant-prometheus
    depends_on:
      api:
        condition: service_started
      worker:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:11.1.4
    container_name: remnant-grafana
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  remnant_postgres_data: